<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Health Architecture</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent: #007AFF;
            --protein: #FF375F;
            --carbs: #0A84FF;
            --fats: #FFD60A;
            --cals: #32D74B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            overflow: hidden;
            color: #fff;
        }

        /* LIVE MESH GRADIENT */
        .mesh-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(at 0% 0%, #1a1a2e 0%, transparent 50%),
                        radial-gradient(at 100% 0%, #0f3460 0%, transparent 50%),
                        radial-gradient(at 100% 100%, #16213e 0%, transparent 50%),
                        radial-gradient(at 0% 100%, #000 0%, transparent 50%);
            background-size: 200% 200%;
            animation: meshMove 20s ease infinite;
            z-index: -2;
        }

        @keyframes meshMove {
            0%, 100% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
        }

        #luminous-glow {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(0, 122, 255, 0.1) 0%, transparent 70%);
            filter: blur(100px);
            z-index: -1;
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translate(-50%, -50%);
            left: 50%; top: 50%;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(50px);
            -webkit-backdrop-filter: blur(50px);
            border: 1px solid var(--glass-border);
            border-radius: 44px;
            padding: 40px;
            width: 420px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        /* SHIMMER EFFECT */
        .glass-card::before {
            content: "";
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.03), transparent);
            transform: rotate(45deg);
            animation: shimmer 6s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        input, select {
            width: 100%; padding: 18px; margin: 12px 0;
            background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border);
            border-radius: 20px; color: white; outline: none; font-size: 1rem;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); background: rgba(255,255,255,0.08); }

        .glass-btn {
            background: var(--accent); color: white; border: none;
            padding: 18px; border-radius: 20px; cursor: pointer;
            font-size: 1.1rem; font-weight: 600; width: 100%; margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0, 122, 255, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .glass-btn:hover { transform: scale(1.02); box-shadow: 0 15px 40px rgba(0, 122, 255, 0.5); }

        .hidden { display: none; opacity: 0; }
        .visible { display: block; animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        /* DASHBOARD ANIMATIONS */
        .cal-hero { font-size: 4rem; font-weight: 200; color: var(--cals); margin-bottom: 5px; animation: glowPulse 2s infinite alternate; }
        @keyframes glowPulse { from { text-shadow: 0 0 10px rgba(50, 215, 75, 0.2); } to { text-shadow: 0 0 30px rgba(50, 215, 75, 0.6); } }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        
        /* Staggered Cards */
        .stat-card { 
            background: rgba(255,255,255,0.03); padding: 20px; border-radius: 24px; 
            border: 1px solid var(--glass-border); text-align: left; opacity: 0;
            transition: transform 0.3s ease, background 0.3s ease;
        }
        .stat-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.06); }

        .stat-card span { display: block; font-size: 1.8rem; font-weight: 700; margin-bottom: 4px; }
        .label { font-size: 0.75rem; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 2px; }

        .animate-card-1 { animation: slideUp 0.6s 0.2s forwards; }
        .animate-card-2 { animation: slideUp 0.6s 0.4s forwards; }
        .animate-card-3 { animation: slideUp 0.6s 0.6s forwards; }
        .animate-card-4 { animation: slideUp 0.6s 0.8s forwards; }

        .unit-toggle { display: flex; background: rgba(255,255,255,0.05); border-radius: 15px; padding: 5px; margin-bottom: 20px; }
        .u-btn { flex: 1; padding: 12px; cursor: pointer; border-radius: 11px; font-size: 0.85rem; transition: 0.3s; text-align: center; }
        .u-active { background: var(--accent); }

    </style>
</head>
<body>

    <div class="mesh-bg"></div>
    <div id="luminous-glow"></div>

    <div class="glass-card" id="mainCard">
        
        <div id="step1" class="visible">
            <h2 style="font-weight: 200; margin-bottom: 25px; letter-spacing: 1px;">Biometrics</h2>
            <div class="unit-toggle">
                <div class="u-btn u-active" id="btn-cm" onclick="setU('cm')">Metric (CM)</div>
                <div class="u-btn" id="btn-ft" onclick="setU('ft')">Imperial (FT)</div>
            </div>
            
            <div id="h-wrap"><input type="number" id="h-val" placeholder="Height (cm)"></div>
            <input type="number" id="weight" placeholder="Weight (kg)">
            <input type="number" id="age" placeholder="Age">
            
            <button class="glass-btn" onclick="goTo(2, '#7000FF')">Continue</button>
        </div>

        <div id="step2" class="hidden">
            <h2 style="font-weight: 200; margin-bottom: 25px;">Objective</h2>
            <select id="goal">
                <option value="lose">Aggressive Fat Loss</option>
                <option value="maintain" selected>Lean Maintenance</option>
                <option value="gain">Hypertrophy / Bulk</option>
            </select>
            <button class="glass-btn" onclick="genDash()">Build Architecture</button>
        </div>

        <div id="step3" class="hidden">
            <p class="label">Target Calories</p>
            <div class="cal-hero" id="d-cals">0</div>
            
            <div style="height: 160px; margin: 10px 0;"><canvas id="chart"></canvas></div>

            <div class="stat-grid">
                <div class="stat-card animate-card-1">
                    <span id="d-p" style="color:var(--protein)">0</span>
                    <p class="label">Protein</p>
                </div>
                <div class="stat-card animate-card-2">
                    <span id="d-c" style="color:var(--carbs)">0</span>
                    <p class="label">Carbs</p>
                </div>
                <div class="stat-card animate-card-3">
                    <span id="d-f" style="color:var(--fats)">0</span>
                    <p class="label">Fats</p>
                </div>
                <div class="stat-card animate-card-4">
                    <span id="d-fiber" style="color:#fff">0</span>
                    <p class="label">Fiber</p>
                </div>
            </div>

            <button class="glass-btn" style="background: var(--glass); margin-top: 30px; border: 1px solid var(--glass-border);" onclick="location.reload()">Start Journey</button>
        </div>
    </div>

    <script>
        function setU(u) {
            document.getElementById('btn-cm').classList.toggle('u-active', u === 'cm');
            document.getElementById('btn-ft').classList.toggle('u-active', u === 'ft');
            const wrap = document.getElementById('h-wrap');
            wrap.innerHTML = u === 'ft' 
                ? `<div style="display:flex; gap:10px"><input type="number" id="ft" placeholder="Ft"><input type="number" id="in" placeholder="In"></div>`
                : `<input type="number" id="h-val" placeholder="Height (cm)">`;
        }

        function goTo(s, col) {
            const glow = document.getElementById('luminous-glow');
            glow.style.background = `radial-gradient(circle, ${col}44 0%, transparent 70%)`;
            
            document.querySelectorAll('.glass-card > div').forEach(d => { d.classList.remove('visible'); d.classList.add('hidden'); });
            const next = document.getElementById('step' + s);
            next.classList.remove('hidden');
            setTimeout(() => next.classList.add('visible'), 50);
        }

        function valAnimate(id, val) {
            let s = 0;
            const obj = document.getElementById(id);
            const t = setInterval(() => {
                s += Math.ceil(val/50);
                if(s >= val) { obj.innerText = Math.round(val); clearInterval(t); }
                else { obj.innerText = s; }
            }, 20);
        }

        function genDash() {
            goTo(3, '#32D74B');
            document.getElementById('mainCard').style.width = '480px';
            
            const w = parseFloat(document.getElementById('weight').value) || 75;
            const g = document.getElementById('goal').value;

            let p = g === 'gain' ? w*2.2 : (g === 'lose' ? w*2.1 : w*1.8);
            let f = w*0.85;
            let c = g === 'gain' ? w*4.8 : (g === 'lose' ? w*2.2 : w*3.5);
            let cals = (p*4) + (c*4) + (f*9);

            valAnimate('d-cals', cals);
            valAnimate('d-p', p);
            valAnimate('d-c', c);
            valAnimate('d-f', f);
            valAnimate('d-fiber', Math.round(cals/1000 * 14));

            new Chart(document.getElementById('chart'), {
                type: 'doughnut',
                data: {
                    datasets: [{
                        data: [p*4, c*4, f*9],
                        backgroundColor: ['#FF375F', '#0A84FF', '#FFD60A'],
                        borderWidth: 0,
                        hoverOffset: 15
                    }]
                },
                options: { cutout: '85%', plugins: { legend: { display: false } }, animation: { duration: 2500, easing: 'easeOutQuart' } }
            });
        }
    </script>
</body>
</html>
